name: product-ai-music-station

services:
  # --- Database ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_music_station
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    ports:
      - "5433:5432"  # Host worker needs DB access
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app} -d ai_music_station"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Database Migrations ---
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: "postgresql+asyncpg://${DB_USER:-app}:${DB_PASSWORD}@postgres:5432/ai_music_station"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # --- Backend API ---
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: "postgresql+asyncpg://${DB_USER:-app}:${DB_PASSWORD}@postgres:5432/ai_music_station"
      ACESTEP_API_URL: "${ACESTEP_API_URL:-http://host.docker.internal:8001}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --- Icecast2 Streaming Server ---
  icecast:
    build:
      context: ./streaming
      dockerfile: Dockerfile.icecast
    environment:
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD:?required}
      ICECAST_ADMIN_PASSWORD: ${ICECAST_ADMIN_PASSWORD:?required}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8000/status-json.xsl || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Liquidsoap 統合ストリーミング（全チャンネル動的対応） ---
  liquidsoap:
    build:
      context: ./streaming/liquidsoap
    environment:
      ICECAST_HOST: icecast
      ICECAST_PORT: "8000"
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD}
      API_BASE_URL: http://api:8000
    volumes:
      - ./generated_tracks:/tracks
    depends_on:
      icecast:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/liquidsoap_healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Frontend ---
  frontend:
    build:
      context: ./frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Reverse Proxy ---
  caddy:
    image: caddy:2-alpine
    ports:
      - "${FRONTEND_PORT:-3200}:3200"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
      icecast:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3200/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
