[project]
name = "ai-music-station"
version = "0.1.0"
description = "ACE-Step v1.5 powered music generation and streaming service"
requires-python = ">=3.11,<3.13"
license = "MIT"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM"]
ignore = ["UP017"]  # datetime.UTC alias requires Python 3.11+

[tool.ruff.lint.per-file-ignores]
# SQLAlchemy Mapped[] requires runtime-evaluated types; can't use PEP 604 on Python < 3.10
"worker/models.py" = ["UP006", "UP007", "UP035", "UP045"]
# Alembic auto-generated migration template
"alembic/versions/*.py" = ["UP006", "UP007", "UP035", "UP045"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "integration: marks tests that require Docker services",
    "e2e: marks end-to-end tests",
]
